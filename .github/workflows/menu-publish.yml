# Menu Publish
#
# Runs after a successful Vercel Production deployment and, if
# packages/shared/src/menu.json changed in the deployed commit, asserts that
# `catalogVersion` was bumped vs. the parent commit, then calls
# POST /api/staff/menu/publish on the just-promoted deployment.
#
# Required setup:
#   - Repo Actions secret: STAFF_MENU_PUBLISH_SECRET (must match the Vercel env var
#     STAFF_MENU_PUBLISH_SECRET on the production project).
#   - Set PUBLISH_URL below to the production publish endpoint.
#
# See README.md → "Menu versioning & workflow" for the full publish contract.

name: Menu Publish

on:
  deployment_status:

permissions:
  contents: read
  deployments: read

env:
  # TODO: set production URL — must match the Vercel production domain serving
  # the staff publish route. Hardcoded by design (see plan: url_source = hardcoded).
  PUBLISH_URL: "https://web-eight-roan-79.vercel.app/api/staff/menu/publish"
  MENU_FILE: "packages/shared/src/menu.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment.environment == 'Production' ||
       github.event.deployment.environment == 'production')
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.deployment.sha }}
          fetch-depth: 0

      - name: Detect menu.json change and assert version bump
        id: detect
        env:
          SHA: ${{ github.event.deployment.sha }}
        run: |
          set -euo pipefail

          if ! git diff --name-only "${SHA}^" "${SHA}" -- "${MENU_FILE}" | grep -q .; then
            echo "menu.json unchanged in ${SHA}; nothing to publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f "${MENU_FILE}" ]; then
            echo "::error::${MENU_FILE} is missing at ${SHA}."
            exit 1
          fi

          NEW=$(jq -r '.catalogVersion' "${MENU_FILE}")
          OLD=$(git show "${SHA}^:${MENU_FILE}" 2>/dev/null | jq -r '.catalogVersion' 2>/dev/null || echo 0)

          if ! [[ "${NEW}" =~ ^[0-9]+$ ]]; then
            echo "::error::catalogVersion in ${MENU_FILE} is not an integer (got '${NEW}')."
            exit 1
          fi
          if ! [[ "${OLD}" =~ ^[0-9]+$ ]]; then
            OLD=0
          fi

          if [ "${NEW}" -le "${OLD}" ]; then
            echo "::error::catalogVersion must be strictly greater than parent commit's value (got ${NEW}, was ${OLD})."
            exit 1
          fi

          echo "menu.json changed; catalogVersion ${OLD} -> ${NEW}."
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW}" >> "$GITHUB_OUTPUT"

      - name: POST staff publish
        if: steps.detect.outputs.should_publish == 'true'
        env:
          STAFF_MENU_PUBLISH_SECRET: ${{ secrets.STAFF_MENU_PUBLISH_SECRET }}
          NEW_VERSION: ${{ steps.detect.outputs.new_version }}
        run: |
          set -euo pipefail

          if [ -z "${STAFF_MENU_PUBLISH_SECRET:-}" ]; then
            echo "::error::Repo secret STAFF_MENU_PUBLISH_SECRET is not set."
            exit 1
          fi

          echo "Publishing catalogVersion=${NEW_VERSION} to ${PUBLISH_URL}"

          response=$(mktemp)
          http_code=$(curl \
            --silent \
            --show-error \
            --location \
            --max-time 60 \
            --retry 3 \
            --retry-all-errors \
            --output "${response}" \
            --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${STAFF_MENU_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            --data "{}" \
            "${PUBLISH_URL}")

          echo "HTTP ${http_code}"
          echo "Response body:"
          cat "${response}"
          echo

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Publish request failed with HTTP ${http_code}."
            exit 1
          fi
