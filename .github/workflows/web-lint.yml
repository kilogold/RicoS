name: Web Lint

on:
  push:
    branches:
      - main
      - preview

jobs:
  web-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify menu catalog version bump
        env:
          MENU_CATALOG_BASE_REF: ${{ github.event.before }}
        run: bun scripts/verify-menu-catalog-version.mjs

      - name: Run architecture lint
        run: bun --cwd web eslint "app/api/**/*.{ts,tsx}" "lib/commerce/**/*.{ts,tsx}" "lib/infrastructure/**/*.{ts,tsx}"
